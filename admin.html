<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Admin — Black Gold Barber Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c; --gold-light: #e5c87a; --gold-dark: #8a6820;
      --black: #0a0a0a; --dark: #111; --dark-2: #1a1a1a; --dark-3: #242424; --dark-4: #2e2e2e;
      --gray: #888; --gray-light: #aaa; --white: #f5f0e8;
      --green: #27ae60; --red: #c0392b; --orange: #e67e22;
      --font-display: 'Playfair Display', serif;
      --font-body: 'Outfit', sans-serif;
      --radius: 6px; --transition: all 0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: var(--font-body); min-height: 100vh; }

    /* Login Screen */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: var(--dark-2); border: 1px solid var(--dark-4); border-radius: 12px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 80px rgba(0,0,0,0.8); }
    .login-brand { text-align: center; margin-bottom: 36px; }
    .login-logo { font-family: var(--font-display); font-size: 2rem; color: var(--gold); margin-bottom: 8px; }
    .login-subtitle { font-size: 14px; color: var(--gray); }
    .login-form .form-group { margin-bottom: 20px; }
    .login-form .form-label { display: block; font-size: 12px; color: var(--gray-light); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .login-form .form-input { width: 100%; background: var(--dark-3); border: 1px solid var(--dark-4); color: var(--white); padding: 14px 16px; border-radius: var(--radius); font-family: var(--font-body); font-size: 15px; transition: var(--transition); }
    .login-form .form-input:focus { outline: none; border-color: var(--gold); }
    .login-btn { width: 100%; background: var(--gold); color: var(--black); border: none; padding: 14px; border-radius: var(--radius); font-weight: 700; font-size: 15px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .login-btn:hover { background: var(--gold-light); }
    .login-error { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3); color: #e05a4a; padding: 12px; border-radius: var(--radius); font-size: 13px; margin-top: 16px; display: none; }
    .login-error.show { display: block; }

    /* Header */
    .header { background: var(--dark-2); border-bottom: 1px solid var(--dark-4); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
    .header-brand { font-family: var(--font-display); font-size: 1.4rem; color: var(--gold); }
    .header-sub { font-size: 12px; color: var(--gray); }
    .header-user { display: flex; align-items: center; gap: 12px; }
    .header-user-name { font-size: 14px; color: var(--white); }
    .btn-logout { background: none; border: 1px solid var(--dark-4); color: var(--gray); padding: 8px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* Layout */
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .admin-content { display: none; }
    .admin-content.active { display: block; }

    /* Tabs */
    .tabs { display: flex; gap: 8px; margin-bottom: 28px; border-bottom: 1px solid var(--dark-4); padding-bottom: 0; }
    .tab { background: none; border: none; color: var(--gray); padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; border-bottom: 2px solid transparent; transition: var(--transition); font-family: var(--font-body); }
    .tab:hover { color: var(--white); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* Filtros */
    .filters { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.06em; }
    .filter-input, .filter-select {
      background: var(--dark-2); border: 1px solid var(--dark-4); color: var(--white);
      padding: 10px 14px; border-radius: var(--radius); font-family: var(--font-body);
      font-size: 14px; transition: var(--transition);
    }
    .filter-input:focus, .filter-select:focus { outline: none; border-color: var(--gold); }
    .filter-select option { background: var(--dark-2); }
    .btn-filter { background: var(--gold); color: var(--black); border: none; padding: 10px 20px; border-radius: var(--radius); font-weight: 600; font-size: 14px; cursor: pointer; transition: var(--transition); align-self: flex-end; font-family: var(--font-body); }
    .btn-filter:hover { background: var(--gold-light); }
    .btn-add { background: var(--green); color: white; }
    .btn-add:hover { background: #229954; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--dark-2); border: 1px solid var(--dark-4); border-radius: 8px; padding: 20px; text-align: center; }
    .stat-num { font-family: var(--font-display); font-size: 2rem; color: var(--gold); }
    .stat-label { font-size: 12px; color: var(--gray); margin-top: 4px; }

    /* Tabla */
    .table-wrap { background: var(--dark-2); border: 1px solid var(--dark-4); border-radius: 8px; overflow: hidden; }
    .table-head { padding: 16px 24px; border-bottom: 1px solid var(--dark-4); display: flex; justify-content: space-between; align-items: center; }
    .table-title { font-family: var(--font-display); font-size: 1.1rem; color: var(--white); }
    .table-count { font-size: 12px; color: var(--gray); }

    table { width: 100%; border-collapse: collapse; }
    th { padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray); text-align: left; border-bottom: 1px solid var(--dark-4); background: var(--dark-3); }
    td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--dark-3); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(201,168,76,0.03); }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-pendiente { background: rgba(230,126,34,0.15); color: var(--orange); border: 1px solid rgba(230,126,34,0.3); }
    .badge-cancelado  { background: rgba(192,57,43,0.15);  color: #e05a4a;       border: 1px solid rgba(192,57,43,0.3); }
    .badge-completado { background: rgba(39,174,96,0.15);  color: #4caf79;       border: 1px solid rgba(39,174,96,0.3); }

    /* Actions */
    .actions { display: flex; gap: 6px; }
    .btn-edit { background: none; border: 1px solid var(--gold-dark); color: var(--gold); padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .btn-edit:hover { background: var(--gold); color: var(--black); }
    .btn-delete { background: none; border: 1px solid rgba(192,57,43,0.4); color: #e05a4a; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .btn-delete:hover { background: var(--red); color: white; border-color: var(--red); }
    .btn-whatsapp { background: none; border: 1px solid rgba(37,211,102,0.4); color: #25d366; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .btn-whatsapp:hover { background: #25d366; color: white; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; display: none; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--dark-2); border: 1px solid var(--dark-4); border-radius: 10px; width: 100%; max-width: 520px; padding: 28px; box-shadow: 0 24px 80px rgba(0,0,0,0.8); max-height: 90vh; overflow-y: auto; }
    .modal-title { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 20px; color: var(--white); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-label { font-size: 11px; color: var(--gray-light); text-transform: uppercase; letter-spacing: 0.06em; }
    .form-input, .form-select {
      background: var(--dark-3); border: 1px solid var(--dark-4); color: var(--white);
      padding: 10px 14px; border-radius: var(--radius); font-family: var(--font-body); font-size: 14px;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--gold); }
    .form-select option { background: var(--dark-2); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
    .btn-cancel-modal { background: none; border: 1px solid var(--dark-4); color: var(--gray); padding: 10px 20px; border-radius: var(--radius); font-family: var(--font-body); cursor: pointer; }
    .btn-cancel-modal:hover { border-color: var(--gold-dark); color: var(--white); }
    .btn-save { background: var(--gold); color: var(--black); border: none; padding: 10px 24px; border-radius: var(--radius); font-weight: 700; font-family: var(--font-body); cursor: pointer; }
    .btn-save:hover { background: var(--gold-light); }

    /* Empty state */
    .empty { text-align: center; padding: 48px; color: var(--gray); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    /* Toast */
    #toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 999; display: none; }
    #toast.show { display: block; }
    #toast.success { background: var(--green); color: white; }
    #toast.error   { background: var(--red);   color: white; }

    @media (max-width: 700px) {
      .filters { flex-direction: column; }
      .form-row { grid-template-columns: 1fr; }
      table { font-size: 12px; }
      th, td { padding: 10px 10px; }
      .tabs { overflow-x: auto; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-logo">✂️ Black Gold</div>
      <div class="login-subtitle">Panel de Administración</div>
    </div>
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-input" id="loginUsername" placeholder="admin" required>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="login-btn">Iniciar Sesión</button>
      <div class="login-error" id="loginError">Usuario o contraseña incorrectos</div>
    </form>
  </div>
</div>

<!-- Admin Content -->
<div class="admin-content" id="adminContent">
  <div class="header">
    <div>
      <div class="header-brand">✂️ Black Gold Barber Shop</div>
      <div class="header-sub">Panel de administración de turnos</div>
    </div>
    <div class="header-user">
      <span class="header-user-name" id="currentUser">Admin</span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="container">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('turnos')">📋 Turnos del Mes</button>
      <button class="tab" onclick="switchTab('agregar')">➕ Agregar Turno</button>
    </div>

    <!-- Tab: Turnos -->
    <div id="tab-turnos" class="tab-content">
      <!-- Stats -->
      <div class="stats" id="stats">
        <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Total turnos</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-hoy">—</div><div class="stat-label">Turnos hoy</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-pendientes">—</div><div class="stat-label">Pendientes</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-cancelados">—</div><div class="stat-label">Cancelados</div></div>
      </div>

      <!-- Filtros -->
      <div class="filters">
        <div class="filter-group">
          <label class="filter-label">Mes</label>
          <input type="month" class="filter-input" id="filtro-mes"/>
        </div>
        <div class="filter-group">
          <label class="filter-label">Barbero</label>
          <select class="filter-select" id="filtro-barbero">
            <option value="">Todos</option>
            <option value="1">Carlos "El Maestro"</option>
            <option value="2">Diego Ramírez</option>
            <option value="3">Andrés "El Artista"</option>
            <option value="4">Juan Sebastián</option>
          </select>
        </div>
        <button class="btn-filter" onclick="cargarTurnos()">Buscar</button>
        <button class="btn-filter" style="background:var(--dark-3);color:var(--gray-light);border:1px solid var(--dark-4)" onclick="limpiarFiltros()">Ver todos</button>
      </div>

      <!-- Tabla -->
      <div class="table-wrap">
        <div class="table-head">
          <div class="table-title">Turnos</div>
          <div class="table-count" id="table-count">—</div>
        </div>
        <div id="tabla-container">
          <div class="empty"><div class="empty-icon">📋</div><p>Cargando turnos…</p></div>
        </div>
      </div>
    </div>

    <!-- Tab: Agregar -->
    <div id="tab-agregar" class="tab-content" style="display: none;">
      <div class="table-wrap" style="max-width: 600px; margin: 0 auto;">
        <div class="table-head">
          <div class="table-title">Nuevo Turno</div>
        </div>
        <div style="padding: 32px;">
          <form id="formAgregar">
            <div class="form-group">
              <label class="form-label">Barbero *</label>
              <select class="form-input" id="add-barbero" required>
                <option value="">Selecciona un barbero</option>
                <option value="1|Carlos 'El Maestro'">Carlos "El Maestro"</option>
                <option value="2|Diego Ramírez">Diego Ramírez</option>
                <option value="3|Andrés 'El Artista'">Andrés "El Artista"</option>
                <option value="4|Juan Sebastián">Juan Sebastián</option>
              </select>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Nombre cliente *</label>
                <input type="text" class="form-input" id="add-nombre" required>
              </div>
              <div class="form-group">
                <label class="form-label">Teléfono *</label>
                <input type="tel" class="form-input" id="add-telefono" required>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Fecha *</label>
                <input type="date" class="form-input" id="add-fecha" required>
              </div>
              <div class="form-group">
                <label class="form-label">Hora inicio *</label>
                <select class="form-input" id="add-hora" required>
                  <option value="">Selecciona hora</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Duración *</label>
                <select class="form-input" id="add-duracion" required>
                  <option value="1">1 hora</option>
                  <option value="2">2 horas consecutivas</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label">Servicio *</label>
                <input type="text" class="form-input" id="add-servicio" required>
              </div>
            </div>

            <div style="margin-top: 24px; display: flex; gap: 12px;">
              <button type="submit" class="btn-save" style="flex: 1;">Guardar Turno</button>
              <button type="button" class="btn-cancel-modal" onclick="switchTab('turnos')">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Editar -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <h2 class="modal-title">Editar Turno</h2>
    <form id="formEditar">
      <input type="hidden" id="edit-id"/>
      
      <div class="form-group">
        <label class="form-label">Nombre cliente</label>
        <input type="text" class="form-input" id="edit-nombre" required/>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Teléfono</label>
          <input type="tel" class="form-input" id="edit-telefono" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-select" id="edit-estado">
            <option value="pendiente">Pendiente</option>
            <option value="completado">Completado</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Fecha</label>
          <input type="date" class="form-input" id="edit-fecha" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Hora inicio</label>
          <select class="form-select" id="edit-hora" required>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Duración</label>
          <select class="form-select" id="edit-horas">
            <option value="1">1 hora</option>
            <option value="2">2 horas</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Servicio</label>
          <input type="text" class="form-input" id="edit-servicio" required/>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel-modal" onclick="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-save">Guardar cambios</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:3001';
  const CREDENTIALS = { username: 'admin', password: 'admin123' }; // Cambia estas credenciales
  
  let turnosData = [];
  let horariosDisponibles = [];

  // ─── Login System ─────────────────────────────────────────────────────────
  function checkAuth() {
    const session = sessionStorage.getItem('adminSession');
    if (session === 'logged_in') {
      showAdminPanel();
    } else {
      showLogin();
    }
  }

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminContent').classList.remove('active');
  }

  function showAdminPanel() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminContent').classList.add('active');
    cargarTurnos();
    cargarHorarios();
  }

  function logout() {
    sessionStorage.removeItem('adminSession');
    showLogin();
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;
    
    if (username === CREDENTIALS.username && password === CREDENTIALS.password) {
      sessionStorage.setItem('adminSession', 'logged_in');
      document.getElementById('currentUser').textContent = username;
      showAdminPanel();
      document.getElementById('loginError').classList.remove('show');
    } else {
      document.getElementById('loginError').classList.add('show');
    }
  });

  // ─── Tabs ─────────────────────────────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
    
    if (tab === 'turnos') {
      document.querySelector('.tab').classList.add('active');
      document.getElementById('tab-turnos').style.display = 'block';
      cargarTurnos();
    } else {
      document.querySelectorAll('.tab')[1].classList.add('active');
      document.getElementById('tab-agregar').style.display = 'block';
    }
  }

  // ─── Utils ────────────────────────────────────────────────────────────────
  function hl(hora) {
    const horarios = {
      '08:00': '8:00 AM', '09:00': '9:00 AM', '10:00': '10:00 AM', '11:00': '11:00 AM',
      '12:00': '12:00 PM', '14:00': '2:00 PM', '15:00': '3:00 PM', '16:00': '4:00 PM',
      '17:00': '5:00 PM', '18:00': '6:00 PM', '19:00': '7:00 PM', '20:00': '8:00 PM', '21:00': '9:00 PM', '22:00': '10:00 PM'
    };
    return horarios[hora] || hora;
  }

  function formatFecha(f) {
    if (!f) return '';
    const [y,m,d] = f.split('-');
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${d} ${meses[parseInt(m)-1]} ${y}`;
  }

  // ─── Cargar Horarios ──────────────────────────────────────────────────────
  async function cargarHorarios() {
    try {
      const res = await fetch(`${API}/api/horarios`);
      horariosDisponibles = await res.json();
      
      // Llenar selects
      const selectEdit = document.getElementById('edit-hora');
      const selectAdd = document.getElementById('add-hora');
      
      selectEdit.innerHTML = horariosDisponibles.map(h => 
        `<option value="${h.valor}">${h.label}</option>`
      ).join('');
      
      selectAdd.innerHTML = '<option value="">Selecciona hora</option>' + horariosDisponibles.map(h => 
        `<option value="${h.valor}">${h.label}</option>`
      ).join('');
    } catch(e) {
      console.error('Error cargando horarios:', e);
    }
  }

  // ─── Cargar Turnos ────────────────────────────────────────────────────────
  async function cargarTurnos() {
    const mes = document.getElementById('filtro-mes').value;
    const barbero_id = document.getElementById('filtro-barbero').value;
    
    let url = `${API}/api/turnos?`;
    if (barbero_id) url += `barbero_id=${barbero_id}&`;

    try {
      const res = await fetch(url);
      let data = await res.json();
      
      // Filtrar por mes si está seleccionado
      if (mes) {
        data = data.filter(t => t.fecha.startsWith(mes));
      }
      
      turnosData = data;
      renderTabla(turnosData);
      renderStats(turnosData);
    } catch(e) {
      showToast('No se pudo conectar al backend', 'error');
    }
  }

  function limpiarFiltros() {
    document.getElementById('filtro-mes').value = '';
    document.getElementById('filtro-barbero').value = '';
    cargarTurnos();
  }

  function renderStats(data) {
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('stat-total').textContent = data.length;
    document.getElementById('stat-hoy').textContent = data.filter(t => t.fecha === hoy).length;
    document.getElementById('stat-pendientes').textContent = data.filter(t => t.estado === 'pendiente').length;
    document.getElementById('stat-cancelados').textContent = data.filter(t => t.estado === 'cancelado').length;
  }

  function renderTabla(data) {
    document.getElementById('table-count').textContent = data.length + ' turno(s)';
    const container = document.getElementById('tabla-container');

    if (data.length === 0) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No hay turnos para mostrar</p></div>`;
      return;
    }

    const rows = data.map(t => `
      <tr>
        <td><strong>${t.nombre}</strong><br/><span style="color:var(--gray);font-size:11px">${t.telefono}</span></td>
        <td>${t.barbero}</td>
        <td>${t.servicio}</td>
        <td>${formatFecha(t.fecha)}</td>
        <td>${hl(t.hora_inicio)} → ${hl(t.hora_fin)}<br/><span style="color:var(--gray);font-size:11px">${t.horas}h</span></td>
        <td><span class="badge badge-${t.estado}">${t.estado}</span></td>
        <td>
          <div class="actions">
            <button class="btn-edit" onclick="abrirEditar(${t.id})">✏️ Editar</button>
            <button class="btn-whatsapp" onclick="enviarWhatsApp(${t.id})">💬 WA</button>
            <button class="btn-delete" onclick="eliminarTurno(${t.id})">🗑️ Borrar</button>
          </div>
        </td>
      </tr>
    `).join('');

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Cliente</th><th>Barbero</th><th>Servicio</th>
            <th>Fecha</th><th>Horario</th><th>Estado</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  // ─── Editar ───────────────────────────────────────────────────────────────
  function abrirEditar(id) {
    const t = turnosData.find(x => x.id === id);
    if (!t) return;
    document.getElementById('edit-id').value = t.id;
    document.getElementById('edit-nombre').value = t.nombre;
    document.getElementById('edit-telefono').value = t.telefono;
    document.getElementById('edit-fecha').value = t.fecha;
    document.getElementById('edit-hora').value = t.hora_inicio;
    document.getElementById('edit-horas').value = t.horas;
    document.getElementById('edit-estado').value = t.estado;
    document.getElementById('edit-servicio').value = t.servicio;
    document.getElementById('modal-editar').classList.add('open');
  }

  function cerrarModal() {
    document.getElementById('modal-editar').classList.remove('open');
  }

  document.getElementById('formEditar').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const body = {
      nombre: document.getElementById('edit-nombre').value,
      telefono: document.getElementById('edit-telefono').value,
      fecha: document.getElementById('edit-fecha').value,
      hora_inicio: document.getElementById('edit-hora').value,
      horas: parseInt(document.getElementById('edit-horas').value),
      estado: document.getElementById('edit-estado').value,
      servicio: document.getElementById('edit-servicio').value,
    };
    try {
      const res = await fetch(`${API}/api/turnos/${id}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error((await res.json()).error);
      cerrarModal();
      showToast('Turno actualizado ✓', 'success');
      cargarTurnos();
    } catch(e) {
      showToast(e.message || 'Error al guardar', 'error');
    }
  });

  // ─── Agregar ──────────────────────────────────────────────────────────────
  document.getElementById('formAgregar').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const barberoValue = document.getElementById('add-barbero').value;
    const [barbero_id, barbero] = barberoValue.split('|');
    
    const body = {
      barbero_id: parseInt(barbero_id),
      barbero: barbero,
      nombre: document.getElementById('add-nombre').value,
      telefono: document.getElementById('add-telefono').value,
      fecha: document.getElementById('add-fecha').value,
      hora_inicio: document.getElementById('add-hora').value,
      horas: parseInt(document.getElementById('add-duracion').value),
      servicio: document.getElementById('add-servicio').value,
    };

    try {
      const res = await fetch(`${API}/api/turnos`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      
      if (!res.ok) {
        const error = await res.json();
        throw new Error(error.error);
      }
      
      showToast('Turno creado exitosamente ✓', 'success');
      document.getElementById('formAgregar').reset();
      switchTab('turnos');
    } catch(e) {
      showToast(e.message || 'Error al crear turno', 'error');
    }
  });

  // ─── Eliminar ─────────────────────────────────────────────────────────────
  async function eliminarTurno(id) {
    const t = turnosData.find(x => x.id === id);
    if (!confirm(`¿Cancelar el turno de ${t?.nombre}?`)) return;
    try {
      await fetch(`${API}/api/turnos/${id}`, { method: 'DELETE' });
      showToast('Turno cancelado', 'success');
      cargarTurnos();
    } catch(e) {
      showToast('Error al cancelar', 'error');
    }
  }

  // ─── WhatsApp ─────────────────────────────────────────────────────────────
  function enviarWhatsApp(id) {
    const t = turnosData.find(x => x.id === id);
    if (!t) return;
    const fechaFormateada = formatFecha(t.fecha);
    const telefono = String(t.telefono).replace(/\D/g,'');
    const tel = telefono.startsWith('57') ? telefono : '57' + telefono;
    const msg = encodeURIComponent(
      `✂️ *Recordatorio de Turno - Black Gold Barber Shop*\n\n` +
      `Hola ${t.nombre} 👋, te recordamos que tienes tu turno:\n\n` +
      `💈 *Barbero:* ${t.barbero}\n` +
      `✂️ *Servicio:* ${t.servicio}\n` +
      `📅 *Fecha:* ${fechaFormateada}\n` +
      `⏰ *Hora:* ${hl(t.hora_inicio)}\n\n` +
      `¡Te esperamos! Por favor llega 5 min antes 🙏`
    );
    window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
  }

  // ─── Toast ────────────────────────────────────────────────────────────────
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3500);
  }

  // Cerrar modal al hacer click fuera
  document.getElementById('modal-editar').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });

  // Inicializar
  checkAuth();
  
  // Establecer mes actual por defecto
  const hoy = new Date();
  const mesActual = hoy.toISOString().substring(0, 7);
  document.getElementById('filtro-mes').value = mesActual;
  
  // Establecer fecha mínima para agregar (hoy)
  document.getElementById('add-fecha').min = hoy.toISOString().split('T')[0];
</script>
</body>
</html>

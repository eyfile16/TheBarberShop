<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel Barberos — Black Gold</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c; --gold-light: #e5c87a; --gold-dark: #8a6820;
      --black: #0a0a0a; --dark: #111; --dark-2: #1a1a1a; --dark-3: #242424; --dark-4: #2e2e2e;
      --gray: #888; --gray-light: #aaa; --white: #f5f0e8;
      --green: #27ae60; --red: #c0392b; --orange: #e67e22;
      --font-display: 'Playfair Display', serif;
      --font-body: 'Outfit', sans-serif;
      --radius: 6px; --transition: all 0.2s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--black); color: var(--white); font-family: var(--font-body); min-height: 100vh; }

    /* Login */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: var(--dark-2); border: 1px solid var(--dark-4); border-radius: 12px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 80px rgba(0,0,0,0.8); }
    .login-brand { text-align: center; margin-bottom: 36px; }
    .login-logo { font-family: var(--font-display); font-size: 2rem; color: var(--gold); margin-bottom: 8px; }
    .login-subtitle { font-size: 14px; color: var(--gray); }
    .login-form .form-group { margin-bottom: 20px; }
    .login-form .form-label { display: block; font-size: 12px; color: var(--gray-light); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .login-form .form-input, .login-form .form-select { width: 100%; background: var(--dark-3); border: 1px solid var(--dark-4); color: var(--white); padding: 14px 16px; border-radius: var(--radius); font-family: var(--font-body); font-size: 15px; transition: var(--transition); }
    .login-form .form-input:focus, .login-form .form-select:focus { outline: none; border-color: var(--gold); }
    .login-form .form-select option { background: var(--dark-2); }
    .login-btn { width: 100%; background: var(--gold); color: var(--black); border: none; padding: 14px; border-radius: var(--radius); font-weight: 700; font-size: 15px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .login-btn:hover { background: var(--gold-light); }
    .login-error { background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3); color: #e05a4a; padding: 12px; border-radius: var(--radius); font-size: 13px; margin-top: 16px; display: none; }
    .login-error.show { display: block; }

    /* Panel */
    .panel-content { display: none; }
    .panel-content.active { display: block; }
    
    .header { background: var(--dark-2); border-bottom: 1px solid var(--dark-4); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
    .header-brand { font-family: var(--font-display); font-size: 1.4rem; color: var(--gold); }
    .header-sub { font-size: 12px; color: var(--gray); }
    .header-user { display: flex; align-items: center; gap: 12px; }
    .header-user-name { font-size: 14px; color: var(--white); }
    .btn-logout { background: none; border: 1px solid var(--dark-4); color: var(--gray); padding: 8px 16px; border-radius: var(--radius); font-size: 13px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    
    .filtros { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.06em; }
    .filter-input, .filter-select {
      background: var(--dark-2); border: 1px solid var(--dark-4); color: var(--white);
      padding: 10px 14px; border-radius: var(--radius); font-family: var(--font-body);
      font-size: 14px; transition: var(--transition);
    }
    .filter-input:focus, .filter-select:focus { outline: none; border-color: var(--gold); }
    .filter-select option { background: var(--dark-2); }
    .btn-filter { background: var(--gold); color: var(--black); border: none; padding: 10px 20px; border-radius: var(--radius); font-weight: 600; font-size: 14px; cursor: pointer; transition: var(--transition); align-self: flex-end; font-family: var(--font-body); }
    .btn-filter:hover { background: var(--gold-light); }

    .table-wrap { background: var(--dark-2); border: 1px solid var(--dark-4); border-radius: 8px; overflow: hidden; }
    .table-head { padding: 16px 24px; border-bottom: 1px solid var(--dark-4); display: flex; justify-content: space-between; align-items: center; }
    .table-title { font-family: var(--font-display); font-size: 1.1rem; color: var(--white); }
    .table-count { font-size: 12px; color: var(--gray); }

    table { width: 100%; border-collapse: collapse; }
    th { padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray); text-align: left; border-bottom: 1px solid var(--dark-4); background: var(--dark-3); }
    td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--dark-3); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(201,168,76,0.03); }

    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-pendiente { background: rgba(230,126,34,0.15); color: var(--orange); border: 1px solid rgba(230,126,34,0.3); }
    .badge-cancelado  { background: rgba(192,57,43,0.15);  color: #e05a4a;       border: 1px solid rgba(192,57,43,0.3); }
    .badge-completado { background: rgba(39,174,96,0.15);  color: #4caf79;       border: 1px solid rgba(39,174,96,0.3); }

    .actions { display: flex; gap: 6px; }
    .btn-edit { background: none; border: 1px solid var(--gold-dark); color: var(--gold); padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .btn-edit:hover { background: var(--gold); color: var(--black); }
    .btn-delete { background: none; border: 1px solid rgba(192,57,43,0.4); color: #e05a4a; padding: 5px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: var(--transition); font-family: var(--font-body); }
    .btn-delete:hover { background: var(--red); color: white; border-color: var(--red); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; display: none; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--dark-2); border: 1px solid var(--dark-4); border-radius: 10px; width: 100%; max-width: 480px; padding: 28px; box-shadow: 0 24px 80px rgba(0,0,0,0.8); }
    .modal-title { font-family: var(--font-display); font-size: 1.2rem; margin-bottom: 20px; color: var(--white); }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-label { font-size: 11px; color: var(--gray-light); text-transform: uppercase; letter-spacing: 0.06em; }
    .form-input, .form-select {
      background: var(--dark-3); border: 1px solid var(--dark-4); color: var(--white);
      padding: 10px 14px; border-radius: var(--radius); font-family: var(--font-body); font-size: 14px;
    }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--gold); }
    .form-select option { background: var(--dark-2); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
    .btn-cancel-modal { background: none; border: 1px solid var(--dark-4); color: var(--gray); padding: 10px 20px; border-radius: var(--radius); font-family: var(--font-body); cursor: pointer; }
    .btn-cancel-modal:hover { border-color: var(--gold-dark); color: var(--white); }
    .btn-save { background: var(--gold); color: var(--black); border: none; padding: 10px 24px; border-radius: var(--radius); font-weight: 700; font-family: var(--font-body); cursor: pointer; }
    .btn-save:hover { background: var(--gold-light); }

    .empty { text-align: center; padding: 48px; color: var(--gray); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }

    #toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 999; display: none; }
    #toast.show { display: block; }
    #toast.success { background: var(--green); color: white; }
    #toast.error   { background: var(--red);   color: white; }

    @media (max-width: 700px) {
      .filtros { flex-direction: column; }
      table { font-size: 12px; }
      th, td { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-logo">✂️ Panel de Barberos</div>
      <div class="login-subtitle">Black Gold Barber Shop</div>
    </div>
    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label class="form-label">Selecciona tu nombre</label>
        <select class="form-select" id="loginBarbero" required>
          <option value="">Selecciona...</option>
          <option value="1">Carlos "El Maestro"</option>
          <option value="2">Diego Ramírez</option>
          <option value="3">Andrés "El Artista"</option>
          <option value="4">Juan Sebastián</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button type="submit" class="login-btn">Iniciar Sesión</button>
      <div class="login-error" id="loginError">Usuario o contraseña incorrectos</div>
    </form>
  </div>
</div>

<!-- Panel Content -->
<div class="panel-content" id="panelContent">
  <div class="header">
    <div>
      <div class="header-brand">✂️ Panel de Barberos</div>
      <div class="header-sub">Gestiona tus turnos del día</div>
    </div>
    <div class="header-user">
      <span class="header-user-name" id="currentUser">Barbero</span>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="container">
    <!-- Filtros -->
    <div class="filtros">
      <div class="filter-group">
        <label class="filter-label">Fecha</label>
        <input type="date" class="filter-input" id="filtro-fecha"/>
      </div>
      <button class="btn-filter" onclick="cargarTurnos()">Buscar</button>
    </div>

    <!-- Tabla -->
    <div class="table-wrap">
      <div class="table-head">
        <div class="table-title">Mis Turnos</div>
        <div class="table-count" id="table-count">—</div>
      </div>
      <div id="tabla-container">
        <div class="empty"><div class="empty-icon">📋</div><p>Selecciona una fecha para ver tus turnos</p></div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Editar -->
<div class="modal-overlay" id="modal-editar">
  <div class="modal">
    <h2 class="modal-title">Editar Turno</h2>
    <form id="formEditar">
      <input type="hidden" id="edit-id"/>
      
      <div class="form-group">
        <label class="form-label">Estado</label>
        <select class="form-select" id="edit-estado">
          <option value="pendiente">Pendiente</option>
          <option value="completado">Completado</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel-modal" onclick="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-save">Guardar cambios</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = 'http://localhost:3001';
  
  // Credenciales de barberos (barbero_id: contraseña)
  const BARBEROS_CREDENTIALS = {
    '1': 'carlos123',
    '2': 'diego123',
    '3': 'andres123',
    '4': 'juan123'
  };

  const BARBEROS_NOMBRES = {
    '1': 'Carlos "El Maestro"',
    '2': 'Diego Ramírez',
    '3': 'Andrés "El Artista"',
    '4': 'Juan Sebastián'
  };
  
  let turnosData = [];
  let currentBarberoId = null;

  // Login
  function checkAuth() {
    const session = sessionStorage.getItem('barberoSession');
    if (session) {
      const barberoId = sessionStorage.getItem('barberoId');
      if (barberoId) {
        currentBarberoId = barberoId;
        showPanel();
        return;
      }
    }
    showLogin();
  }

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('panelContent').classList.remove('active');
  }

  function showPanel() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('panelContent').classList.add('active');
    document.getElementById('currentUser').textContent = BARBEROS_NOMBRES[currentBarberoId];
    
    const hoy = new Date().toISOString().split('T')[0];
    document.getElementById('filtro-fecha').value = hoy;
    cargarTurnos();
  }

  function logout() {
    sessionStorage.removeItem('barberoSession');
    sessionStorage.removeItem('barberoId');
    currentBarberoId = null;
    showLogin();
  }

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const barberoId = document.getElementById('loginBarbero').value;
    const password = document.getElementById('loginPassword').value;
    
    if (BARBEROS_CREDENTIALS[barberoId] === password) {
      sessionStorage.setItem('barberoSession', 'logged_in');
      sessionStorage.setItem('barberoId', barberoId);
      currentBarberoId = barberoId;
      showPanel();
      document.getElementById('loginError').classList.remove('show');
    } else {
      document.getElementById('loginError').classList.add('show');
    }
  });

  // Funciones
  function hl(hora) {
    const horarios = {
      '08:00': '8:00 AM', '09:00': '9:00 AM', '10:00': '10:00 AM', '11:00': '11:00 AM',
      '12:00': '12:00 PM', '14:00': '2:00 PM', '15:00': '3:00 PM', '16:00': '4:00 PM',
      '17:00': '5:00 PM', '18:00': '6:00 PM', '19:00': '7:00 PM', '20:00': '8:00 PM', '21:00': '9:00 PM', '22:00': '10:00 PM'
    };
    return horarios[hora] || hora;
  }

  function formatFecha(f) {
    if (!f) return '';
    const [y,m,d] = f.split('-');
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${d} ${meses[parseInt(m)-1]} ${y}`;
  }

  async function cargarTurnos() {
    const fecha = document.getElementById('filtro-fecha').value;
    
    if (!fecha) {
      showToast('Por favor selecciona una fecha', 'error');
      return;
    }

    let url = `${API}/api/turnos?barbero_id=${currentBarberoId}&fecha=${fecha}`;

    try {
      const res = await fetch(url);
      turnosData = await res.json();
      renderTabla(turnosData);
    } catch(e) {
      showToast('No se pudo conectar al backend', 'error');
    }
  }

  function renderTabla(data) {
    document.getElementById('table-count').textContent = data.length + ' turno(s)';
    const container = document.getElementById('tabla-container');

    if (data.length === 0) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No tienes turnos para esta fecha</p></div>`;
      return;
    }

    const rows = data.map(t => `
      <tr>
        <td><strong>${t.nombre}</strong><br/><span style="color:var(--gray);font-size:11px">${t.telefono}</span></td>
        <td>${t.servicio}</td>
        <td>${hl(t.hora_inicio)} → ${hl(t.hora_fin)}<br/><span style="color:var(--gray);font-size:11px">${t.horas}h</span></td>
        <td><span class="badge badge-${t.estado}">${t.estado}</span></td>
        <td>
          <div class="actions">
            <button class="btn-edit" onclick="abrirEditar('${t._id}')">✏️ Editar</button>
            <button class="btn-delete" onclick="cancelarTurno('${t._id}')">❌ Cancelar</button>
          </div>
        </td>
      </tr>
    `).join('');

    container.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Cliente</th><th>Servicio</th><th>Horario</th><th>Estado</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }

  function abrirEditar(id) {
    const t = turnosData.find(x => x._id === id);
    if (!t) return;
    document.getElementById('edit-id').value = t._id;
    document.getElementById('edit-estado').value = t.estado;
    document.getElementById('modal-editar').classList.add('open');
  }

  function cerrarModal() {
    document.getElementById('modal-editar').classList.remove('open');
  }

  document.getElementById('formEditar').addEventListener('submit', async function(e) {
    e.preventDefault();
    const id = document.getElementById('edit-id').value;
    const body = {
      estado: document.getElementById('edit-estado').value,
    };
    try {
      const res = await fetch(`${API}/api/turnos/${id}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error((await res.json()).error);
      cerrarModal();
      showToast('Turno actualizado ✓', 'success');
      cargarTurnos();
    } catch(e) {
      showToast(e.message || 'Error al guardar', 'error');
    }
  });

  async function cancelarTurno(id) {
    const t = turnosData.find(x => x._id === id);
    if (!confirm(`¿Cancelar el turno de ${t?.nombre}?`)) return;
    try {
      await fetch(`${API}/api/turnos/${id}`, { method: 'DELETE' });
      showToast('Turno cancelado', 'success');
      cargarTurnos();
    } catch(e) {
      showToast('Error al cancelar', 'error');
    }
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => t.className = '', 3500);
  }

  document.getElementById('modal-editar').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });

  // Iniciar
  checkAuth();
</script>
</body>
</html>
